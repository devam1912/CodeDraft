services:
  # ── Frontend build (produces static files) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      - frontend_dist:/usr/share/nginx/html
    # This container just holds the built files — it exits after copy
    command: ["sh", "-c", "echo 'Frontend build complete' && tail -f /dev/null"]

  # ── Backend API + WebSocket server ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env.production
    expose:
      - "5000"
    restart: unless-stopped
    depends_on:
      - frontend

  # ── Nginx reverse proxy ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  frontend_dist:
