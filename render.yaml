services:
  # ── Backend API ──
  - type: web
    name: codedraft-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: JUDGE0_API_KEY
        sync: false
      - key: JUDGE0_BASE_URL
        value: https://judge0-ce.p.rapidapi.com
      - key: JUDGE0_TIMEOUT_MS
        value: 5000
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /api/health
